<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional Headshot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }

    .photo-wrapper {
      width: 160px;
      height: 160px;
      margin: 0 auto 24px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #2c5f8a;
      background: #dce8f3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-placeholder {
      font-size: 64px;
      line-height: 1;
      color: #7aafd4;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .title {
      font-size: 1rem;
      color: #2c5f8a;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #2c5f8a;
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .bio {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #555;
      margin-bottom: 24px;
    }

    .contact {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.9rem;
      color: #444;
    }

    .contact a {
      color: #2c5f8a;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="photo-wrapper">
      <!-- Replace the span below with an <img> tag pointing to your headshot -->
      <span class="photo-placeholder" aria-label="Headshot placeholder">&#128100;</span>
    </div>
    <h1>Romit Chakraborty</h1>
    <p class="title">Software Engineer</p>
    <div class="divider"></div>
    <p class="bio">
      Passionate about building elegant solutions to complex problems.
      Open to new opportunities and professional connections.
    </p>
    <div class="contact">
      <a href="mailto:contact@example.com">&#9993; contact@example.com</a>
      <a href="https://github.com/RomitChakraborty" target="_blank" rel="noopener noreferrer">&#128279; GitHub Profile</a>
    </div>
  </div>
</body>
</html>
